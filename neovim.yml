---
name: neovim
globals:
  vim:
    any: true
  assert:
    args:
      - type: bool
      - type: string
        required: false
  describe:
    args:
      - type: string
      - type: function
  it:
    args:
      - type: string
      - type: function
  before_each:
    args:
      - type: function
  after_each:
    args:
      - type: function
